name: Publish NPM Packages

on:
  workflow_dispatch:
    inputs:
      publish_native:
        description: 'Publish @nexusmods/fomod-installer-native'
        type: boolean
        default: true
      publish_ipc:
        description: 'Publish @nexusmods/fomod-installer-ipc'
        type: boolean
        default: true
      dry_run:
        description: 'Dry run (do not actually publish)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-native:
    if: ${{ inputs.publish_native }}
    strategy:
      matrix:
        include:
          - os: windows-2022
            platform: win32-x64
          - os: ubuntu-latest
            platform: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.x'

      - name: Install Node.js via Volta
        uses: volta-cli/action@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build native binaries
        run: |
          pnpm --filter @nexusmods/fomod-installer-native build-native
          pnpm --filter @nexusmods/fomod-installer-native build-napi

      - name: Copy native artifacts to prebuilds dir
        working-directory: src/ModInstaller.Native.TypeScript
        shell: bash
        run: |
          mkdir -p prebuilds/${{ matrix.platform }}
          cp build/Release/modinstaller.node prebuilds/${{ matrix.platform }}/modinstaller.napi.node
          if [ "${{ matrix.platform }}" = "win32-x64" ]; then
            cp ModInstaller.Native.dll prebuilds/${{ matrix.platform }}/
            cp ModInstaller.Native.lib prebuilds/${{ matrix.platform }}/
          elif [ "${{ matrix.platform }}" = "linux-x64" ]; then
            cp ModInstaller.Native.so prebuilds/${{ matrix.platform }}/
          fi

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: src/ModInstaller.Native.TypeScript/prebuilds/${{ matrix.platform }}/

      - name: Upload native header
        uses: actions/upload-artifact@v4
        with:
          name: native-header-${{ matrix.platform }}
          path: src/ModInstaller.Native.TypeScript/ModInstaller.Native.h

  publish-native:
    if: ${{ inputs.publish_native }}
    needs: build-native
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js via Volta
        uses: volta-cli/action@v4

      - name: Setup npm registry for provenance publishing
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build webpack bundle and declarations
        run: pnpm --filter @nexusmods/fomod-installer-native build-webpack

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: src/ModInstaller.Native.TypeScript/prebuilds/
          pattern: native-*
          merge-multiple: false

      - name: Move platform artifacts into prebuilds
        working-directory: src/ModInstaller.Native.TypeScript
        shell: bash
        run: |
          # download-artifact creates native-win32-x64/, native-linux-x64/, and native-header-* dirs
          # Extract the header (platform-independent) to package root
          for dir in prebuilds/native-header-*/; do
            cp "$dir"ModInstaller.Native.h .
            rm -rf "$dir"
          done
          # Move platform prebuilds to the expected dir names
          for dir in prebuilds/native-*/; do
            platform=$(basename "$dir" | sed 's/^native-//')
            mkdir -p "prebuilds/$platform"
            cp -r "$dir"* "prebuilds/$platform/"
            rm -rf "$dir"
          done
          echo "=== package contents ==="
          ls -la ModInstaller.Native.h
          find prebuilds/ -type f

      - name: Publish
        working-directory: src/ModInstaller.Native.TypeScript
        shell: bash
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --dry-run --access public --provenance
          else
            npm publish --access public --provenance
          fi

  build-ipc:
    if: ${{ inputs.publish_ipc }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.x'

      - name: Install Node.js via Volta
        uses: volta-cli/action@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install and build IPC
        run: |
          pnpm install
          pnpm --filter @nexusmods/fomod-installer-ipc build

      - name: Upload IPC dist
        uses: actions/upload-artifact@v4
        with:
          name: ipc-dist
          path: src/ModInstaller.IPC.TypeScript/dist/

  publish-ipc:
    if: ${{ inputs.publish_ipc }}
    needs: build-ipc
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js 24 for npm provenance publishing
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Download IPC dist
        uses: actions/download-artifact@v4
        with:
          name: ipc-dist
          path: src/ModInstaller.IPC.TypeScript/dist/

      - name: List dist contents
        working-directory: src/ModInstaller.IPC.TypeScript
        shell: bash
        run: |
          echo "=== dist/ contents ==="
          find dist/ -type f

      - name: Publish
        working-directory: src/ModInstaller.IPC.TypeScript
        shell: bash
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --dry-run --access public --provenance
          else
            npm publish --access public --provenance
          fi
